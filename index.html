<body>

<canvas id="blast"></canvas>

<h1 id="wish">🌈 Happy Holi 2026 🌈</h1>

<input type="text" id="name" placeholder="Apna Naam Likho">

<br>

<button onclick="startExperience()">🎵 Play & Generate Wish</button>

<div id="shareBtn"></div>

  atOptions = {

<script async="async" data-cfasync="false" src="https://pl28743930.effectivegatecpm.com/16a7b68d6fbb9bede8be362f909e17d4/invoke.js"></script>
<div id="container-16a7b68d6fbb9bede8be362f909e17d4"></div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>

// 🎨 Full Screen Color Blast
var canvas=document.getElementById("blast");
var ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

var particles=[];
function createBlast(){
for(let i=0;i<200;i++){
particles.push({
x:canvas.width/2,
y:canvas.height/2,
dx:(Math.random()-0.5)*10,
dy:(Math.random()-0.5)*10,
color:"hsl("+Math.random()*360+",100%,50%)"
});
}
}

function animate(){
ctx.fillStyle="rgba(0,0,0,0.1)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
ctx.fillStyle=p.color;
ctx.fillRect(p.x,p.y,5,5);
p.x+=p.dx;
p.y+=p.dy;
});
requestAnimationFrame(animate);
}
animate();

// 🎯 Start Function
function startExperience(){
var name=document.getElementById("name").value;
if(name==""){
alert("Naam likho pehle!");
return;
}

document.getElementById("music").play();
createBlast();

var url=window.location.href.split("?")[0]+"?name="+name;
var msg=name+" ne aapko Holi ki badhai bheji 🌈🔥 Dekho 👉 "+url;

var wa="https://wa.me/?text="+encodeURIComponent(msg);

document.getElementById("shareBtn").innerHTML=
"<br><a href='"+wa+"' target='_blank'><button>Share on WhatsApp</button></a>";
}

// 🎉 Name Effect
window.onload=function(){
var params=new URLSearchParams(window.location.search);
var name=params.get("name");
if(name){
document.getElementById("wish").innerHTML=
"🌈 Happy Holi 🌈<br>"+name+" Ki Taraf Se 🔥";
}
}
</script>

<!-- 🔥 Popunder (Body End) -->
