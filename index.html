<body>

<canvas id="firework"></canvas>

<h1 id="wish">🌈 Happy Holi 2026 🌈</h1>

<div class="neon-box">

<input type="text" id="name" placeholder="Apna Naam Likho">

<button onclick="generateWish()">🎉 Generate & Share</button>

<div id="shareArea"></div>

</div>

<div id="container-16a7b68d6fbb9bede8be362f909e17d4"></div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
// 🎆 Firework Effect
var canvas=document.getElementById("firework");
var ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

var particles=[];
function createFirework(){
for(let i=0;i<150;i++){
particles.push({
x:canvas.width/2,
y:canvas.height/2,
dx:(Math.random()-0.5)*8,
dy:(Math.random()-0.5)*8,
color:"hsl("+Math.random()*360+",100%,50%)",
life:100
});
}
}

function animate(){
ctx.fillStyle="rgba(15,12,41,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach((p,index)=>{
ctx.fillStyle=p.color;
ctx.fillRect(p.x,p.y,4,4);
p.x+=p.dx;
p.y+=p.dy;
p.life--;
if(p.life<=0) particles.splice(index,1);
});

requestAnimationFrame(animate);
}
animate();

// 🎉 Generate Wish
function generateWish(){
var name=document.getElementById("name").value;
if(name==""){
alert("Naam likho pehle!");
return;
}

document.getElementById("music").play();
createFirework();

var url=window.location.href.split("?")[0]+"?name="+name;
var msg=name+" ne aapko Holi ki badhai bheji 🌈🔥 Dekho 👉 "+url;
var wa="https://wa.me/?text="+encodeURIComponent(msg);

document.getElementById("shareArea").innerHTML=
"<div class='share-btn'><a href='"+wa+"' target='_blank'><button>Share on WhatsApp</button></a></div>";
}

// 🎯 Name From URL
window.onload=function(){
var params=new URLSearchParams(window.location.search);
var name=params.get("name");
if(name){
document.getElementById("wish").innerHTML=
"🌈 Happy Holi 🌈<br>"+name+" Ki Taraf Se 🔥";
createFirework();
}
}
</script>
